services:
  mysql:
    image: mysql:8.0
    container_name: benefits-mysql
    restart: unless-stopped
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-benefits_ai}
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
